{% extends "store/base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class= "col-md-4">
        <h3 class="text-center m-4">Вхід у магазин</h3>

        <form method="POST">
            {% csrf_token %}
           <div style ="line-height: 2;">
                {{ form.as_p }}
           </div>
           <button type="submit" class="btn btn-primary w-100">Увійти</button>
        </form>
    </div>
</div>
{% endblock %}
