<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Книжковий магазин</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'store:book_list' %}">📚 SuperBook</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'store:book_list' %}">Каталог</a>
                        <a class="nav-link text-success" href="{% url 'store:book_create' %}">+ Додати книгу</a>
                    </li>
                </ul>
                    <form class="d-flex" method="GET" action="{% url 'store:book_list' %}">
                        <input class="form-control me-2" type="search" placeholder="Пошук книг..." name="q" value="{{ request.GET.q }}">
                        <button class="btn btn-outline-light" type="submit">Знайти</button>
                    </form>
                    
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
