{% load static %}<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Книжковий магазин</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'store:book_list' %}">📚 SuperBook</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                            <a class="nav-link" href="{% url 'store:book_list' %}">Каталог</a>
                    </li>
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link text-success" href="{% url 'store:book_create' %}">+ Додати книгу</a>
                        </li>
                    {% endif %}
                </ul>

                <div class="d-flex align-items-center">     
                    
                    {% if user.is_authenticated %}
                        <span class="text-light me-3">Привіт, {{ user.username }}!</span>
                        <form method="POST" action="{% url 'logout' %}" class="me-3 mb-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">Вийти</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Увійти</a>
                        <a href="{% url 'register' %}" class="btn btn-warning btn-sm me-3">Реєстрація</a>
                    {% endif %}

                    <form class="d-flex" method="GET" action="{% url 'store:book_list' %}">
                        <input class="form-control me-2" type="search" placeholder="Пошук книг..." name="q" value="{{ request.GET.q }}">
                        <button class="btn btn-outline-light" type="submit">Знайти</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
