{% extends 'store/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 text-center">
        <h2 class="text-danger">Видалення книги</h2>
        <p class="lead mt-3">Ви впевнені, що хочете видалити книгу <strong>"{{ object.title }}"</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Так, видалити</button>
            <a href="{% url 'store:book_list' %}" class="btn btn-secondary">Ні, повернутися</a>
        </form>
    </div>
</div>
{% endblock %}
