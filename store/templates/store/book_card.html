<div class ="card h-100 shadow-sm">
    <div class="card-body">
    <h5 class="card-title">{{ product.title }}</h5>
    <h6 class="card-subtitle mb-2 text-muted">{{ product.author }}</h6>
    <p class="card-text"><strong>Ціна:</strong> {{ product.price|floatformat:2 }} грн.</p>
    <a href="{% url 'store:book_detail' product.id %}" class="btn btn-primary">Детальніше</a>
    </div>
</div>
